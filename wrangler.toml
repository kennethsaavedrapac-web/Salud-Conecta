name = "salud-conecta-api"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Ruta personalizada (opcional — la URL por defecto funciona igual)
# route = { pattern = "api.tudominio.com/chat", zone_name = "tudominio.com" }

[vars]
